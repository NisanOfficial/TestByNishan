<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NisanOfficial - Connect Instantly</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    body {
      background: #0a0e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      max-width: 380px;
      background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
      border-radius: 32px;
      padding: 40px 28px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }
    
    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    
    .logo h1 {
      color: white;
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 28px;
      height: 28px;
      background: white;
      border-radius: 8px;
      display: inline-block;
    }
    
    h2 {
      color: white;
      font-size: 28px;
      text-align: center;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .subtitle {
      color: rgba(255,255,255,0.6);
      text-align: center;
      font-size: 14px;
      margin-bottom: 32px;
    }
    
    .social-btns {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .social-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .divider {
      text-align: center;
      color: rgba(255,255,255,0.4);
      margin: 24px 0;
      font-size: 14px;
      position: relative;
    }
    
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      padding: 16px 20px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      outline: none;
    }
    
    input::placeholder { color: rgba(255,255,255,0.4); }
    
    .forgot {
      text-align: right;
      margin: -8px 0 24px 0;
    }
    
    .forgot a {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      text-decoration: none;
    }
    
    .main-btn {
      width: 100%;
      background: linear-gradient(90deg, #38bdf8 0%, #60a5fa 100%);
      color: #0f172a;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    
    .bottom-text {
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
    
    .bottom-text a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 500;
    }
    
    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1><span class="logo-icon"></span> NisanX</h1>
    </div>
    
    <h2>Hi There!</h2>
    <p class="subtitle">Please enter required details.</p>
    
    <div class="social-btns">
      <button class="social-btn">🔍 Google</button>
      <button class="social-btn">🍎 Apple</button>
    </div>
    
    <div class="divider">Or</div>
    
    <input type="email" placeholder="Email address">
    <input type="password" placeholder="Password">
    
    <div class="forgot">
      <a href="#">Forgot Password?</a>
    </div>
    
    <button class="main-btn">Log In</button>
    
    <p class="bottom-text">
      Create an account? <a href="#">Sign Up</a>
    </p>
    
    <div class="footer">
      Terms of Service | Privacy Policy
    </div>
  </div>
</body>
</html>
